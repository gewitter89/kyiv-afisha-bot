# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with app/
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to prepend to the "slug"
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# otherwise 'prepend_sys_path' must be set
# version_locations = %(here)s/alembic/versions

# version path separator; defaults to os.pathsep.
# Use a newline to make it easy to associate multiple version locations.
# version_path_separator = :

# logging configuration is at the end of the file

# the database URL is read dynamically from app configurations in env.py

[post_write_hooks]
# post_write_hooks defines scripts or commands to run after a new migration is created

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)-5.5s] [%(name)s] %(message)s
datefmt = %H:%M:%S
