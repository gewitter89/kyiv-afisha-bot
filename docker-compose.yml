version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: kyiv_events
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: backend
    restart: always
    command: sh -c "alembic upgrade head && python app/db_seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/workspace
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  worker:
    build: ./backend
    container_name: celery_worker
    restart: always
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/workspace
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  scheduler:
    build: ./backend
    container_name: celery_scheduler
    restart: always
    command: celery -A app.tasks.worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/workspace
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  bot:
    build: ./backend
    container_name: telegram_bot
    restart: always
    command: python app/bot/main.py
    volumes:
      - ./backend:/workspace
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    environment:
      - VITE_API_PROXY_URL=http://backend:8000
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
